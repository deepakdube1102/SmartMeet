<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Geometric Abstract M/S Shape -->
  <path d="M10 30V10L20 20L30 10V30" stroke="#cba135" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="bevel"/>
  
  <!-- Central Insight Spark -->
  <path d="M20 15L21.5 20L26 21.5L21.5 23L20 28L18.5 23L14 21.5L18.5 20L20 15Z" fill="#cba135">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
  </path>
  
  <!-- Orbital Rings (Subtle) -->
  <circle cx="20" cy="21.5" r="14" stroke="#cba135" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 20 21.5" to="360 20 21.5" dur="20s" repeatCount="indefinite" />
  </circle>
</svg>
